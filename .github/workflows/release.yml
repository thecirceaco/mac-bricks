name: Build release ZIP

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare release directory
        run: |
          mkdir -p dist/mac-bricks
          rsync -av \
            --exclude='composer.lock' \
            --exclude='vendor' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='.git*' \
            --exclude='.github' \
            --exclude='.codex' \
            --exclude='AGENTS.md' \
            --exclude='README.md' \
            --exclude='readme.txt' \
            --exclude='composer.json' \
            --exclude='phpcs.xml.dist' \
            --exclude='dist' \
            ./ dist/mac-bricks/

      - name: Create ZIP
        run: |
          cd dist
          zip -r mac-bricks-${GITHUB_REF_NAME}.zip mac-bricks

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mac-bricks-${{ github.ref_name }}.zip
